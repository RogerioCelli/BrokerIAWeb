<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Importação - Broker IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .bulk-actions {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 1rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #0f172a;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .checkbox-cell {
            width: 40px;
            text-align: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Modal / Sidebar para Edição */
        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background: var(--card-bg);
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
            padding: 2rem;
            border-left: 1px solid var(--border);
        }

        .overlay.active {
            transform: translateX(0);
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        .field-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .input-edit {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .json-preview {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #10b981;
            overflow-x: auto;
            margin-top: 1rem;
        }

        .load-indicator {
            padding: 3rem;
            text-align: center;
            color: var(--text-secondary);
        }

        #bulk-bar {
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #bulk-bar.visible {
            transform: translateY(0);
            opacity: 1;
            display: flex !important;
        }
    </style>
</head>

<body>

    <a href="/admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Painel Geral</a>

    <div class="header">
        <div>
            <h1>Validação de Importações (Extração Master)</h1>
            <p style="color: var(--text-secondary)">Revise os dados extraídos pela IA antes de enviar para o banco
                final.</p>
        </div>
        <button class="btn btn-secondary" onclick="loadPending()">
            <i class="fas fa-sync"></i> Atualizar Fila
        </button>
    </div>

    <div class="bulk-actions" id="bulk-bar" style="display: none;">
        <span id="selected-count" style="font-weight: 600; margin-right: 1rem;">0 selecionados</span>
        <button class="btn btn-approve" onclick="bulkApprove()">
            <i class="fas fa-check-double"></i> Aprovar em Massa
        </button>
        <button class="btn btn-delete" onclick="bulkDelete()">
            <i class="fas fa-trash-alt"></i> Excluir Selecionados
        </button>
    </div>

    <div id="table-container">
        <div class="load-indicator">Carregando fila de importação...</div>
    </div>

    <!-- PANEL DE EDIÇÃO INDIVIDUAL -->
    <div id="edit-panel" class="overlay">
        <div class="overlay-header">
            <h2>Editar Registro</h2>
            <button class="btn btn-secondary" onclick="closeEdit()"><i class="fas fa-times"></i></button>
        </div>

        <div id="edit-form">
            <!-- Gerado dinamicamente -->
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button id="btn-save-approve" class="btn btn-approve" style="flex: 1;" onclick="saveAndApproveManual()">
                <i class="fas fa-save"></i> Salvar e Importar
            </button>
            <button class="btn btn-delete" onclick="confirmDeleteIndividual()">
                <i class="fas fa-trash"></i> Descartar
            </button>
        </div>

        <h4 style="margin-top: 2rem; color: var(--text-secondary);">JSON Bruto da Extração</h4>
        <div id="raw-json" class="json-preview"></div>
    </div>

    <script>
        let pendingData = [];
        let selectedIds = new Set();
        let currentEditId = null;
        let currentFullItem = null;

        // HELPER: Converte data BR (DD/MM/YYYY) para ISO (YYYY-MM-DD)
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            if (dateStr.includes('-')) return dateStr; // Já está em ISO
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
            return dateStr;
        }

        // HELPER: Normaliza os diferentes formatos de JSON (n8n vs Interno)
        function normalizeData(raw) {
            if (!raw) return { segurado: {}, apolice: {}, endereco: {} };

            let data = typeof raw === 'string' ? JSON.parse(raw) : raw;
            console.log("[DEBUG] Normalizando dados:", data);

            // Suporte para array do n8n (recursivo simples)
            if (Array.isArray(data)) data = data[0];
            if (!data) return { segurado: {}, apolice: {}, endereco: {} };

            // Suporte para wrapper "OrganizaDados" ou "organizadados"
            const wrapperKey = Object.keys(data).find(k => k.toLowerCase() === 'organizadados');
            if (wrapperKey) data = data[wrapperKey];

            const norm = {
                segurado: {},
                apolice: {},
                endereco: {}
            };

            // 1. Mapear Segurado (Identificacao, Identificação, Segurado, cliente)
            const idenKey = Object.keys(data).find(k => ['identificacao', 'identificação', 'segurado', 'cliente'].includes(k.toLowerCase()));
            const iden = idenKey ? data[idenKey] : data; // Fallback para a raiz se não achar chave

            norm.segurado.NomeCompleto = iden.nome_completo || iden.NomeCompleto || iden.nome || iden.Nome || "Não Identificado";

            const doc = (String(iden.cpf_cnpj || iden.CPF || iden.CNPJ || iden.cpf || iden.cnpj || "")).replace(/\D/g, '');
            if (doc.length === 11) norm.segurado.CPF = doc;
            else if (doc.length === 14) norm.segurado.CNPJ = doc;

            // 2. Mapear Contatos
            const contKey = Object.keys(data).find(k => k.toLowerCase() === 'contatos');
            const cont = contKey ? data[contKey] : (iden.Contatos || iden.contatos || {});
            norm.segurado.Email = (cont.emails && cont.emails[0]) || cont.Email || iden.Email || cont.email || "";
            norm.segurado.Celular = (cont.celulares && cont.celulares[0]) || cont.Celular || iden.Celular || cont.celular || "";

            // 3. Mapear Apólice (dados_da_apolice, DadosApolice, apolice)
            const apolKey = Object.keys(data).find(k => ['dados_da_apolice', 'dados_da_apólice', 'dadosapolice', 'apolice'].includes(k.toLowerCase()));
            const apol = apolKey ? data[apolKey] : (iden.dados_da_apolice || {});

            norm.apolice.NumeroApolice = apol.numero_apolice || apol.NumeroApolice || apol.numero || "";
            norm.apolice.Seguradora = apol.seguradora || apol.Seguradora || "";
            norm.apolice.Ramo = apol.ramo || apol.Ramo || "";
            norm.apolice.VigenciaInicio = formatDateForInput(apol.vigencia_inicio || apol.VigenciaInicio || apol.inicio);
            norm.apolice.VigenciaFim = formatDateForInput(apol.vigencia_fim || apol.VigenciaFim || apol.fim);

            return norm;
        }

        // 1. Mapear Segurado (Identificacao no n8n)
        const iden = data.Identificacao || data.Segurado || data.cliente || {};
        norm.segurado.NomeCompleto = iden.nome_completo || iden.NomeCompleto || iden.nome || "Não Identificado";
        const doc = (iden.cpf_cnpj || iden.CPF || iden.CNPJ || "").replace(/\D/g, '');
        if (doc.length === 11) norm.segurado.CPF = doc;
        else if (doc.length === 14) norm.segurado.CNPJ = doc;

        // 2. Mapear Contatos
        const cont = data.contatos || iden.Contatos || {};
        norm.segurado.Email = (cont.emails && cont.emails[0]) || cont.Email || iden.Email || "";
        norm.segurado.Celular = (cont.celulares && cont.celulares[0]) || cont.Celular || iden.Celular || "";

        // 3. Mapear Apólice (dados_da_apolice no n8n)
        const apol = data.dados_da_apolice || data.DadosApolice || data.apolice || iden.dados_da_apolice || {};
        norm.apolice.NumeroApolice = apol.numero_apolice || apol.NumeroApolice || "";
        norm.apolice.Seguradora = apol.seguradora || apol.Seguradora || "";
        norm.apolice.Ramo = apol.ramo || apol.Ramo || "";
        norm.apolice.VigenciaInicio = formatDateForInput(apol.vigencia_inicio || apol.VigenciaInicio);
        norm.apolice.VigenciaFim = formatDateForInput(apol.vigencia_fim || apol.VigenciaFim);

        return norm;
        }

        async function loadPending() {
            const container = document.getElementById('table-container');
            try {
                const token = localStorage.getItem('admin_token');
                const res = await fetch('/api/admin/staging/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                pendingData = data;
                selectedIds.clear();
                renderTable();
            } catch (err) {
                container.innerHTML = `<p style="color:red">Erro ao carregar: ${err.message}</p>`;
            }
        }

        function renderTable() {
            const container = document.getElementById('table-container');
            if (!pendingData || pendingData.length === 0) {
                container.innerHTML = '<div class="load-indicator">🎉 Nenhuma importação pendente!</div>';
                document.getElementById('bulk-bar').classList.remove('visible');
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                            <th>Data Extração</th>
                            <th>Segurado</th>
                            <th>Nº Apólice</th>
                            <th>Ramo / Documento</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            pendingData.forEach(item => {
                const isSelected = selectedIds.has(item.id);
                // Tenta extrair o nome real se o sumário estiver vazio
                let nomeExibicao = item.nome_segurado;
                let numApolice = "";

                if (item.dados_json) {
                    const norm = normalizeData(item.dados_json);
                    if (nomeExibicao === "Não Identificado") nomeExibicao = norm.segurado.NomeCompleto;
                    numApolice = norm.apolice.NumeroApolice;
                }

                html += `
                    <tr>
                        <td class="checkbox-cell"><input type="checkbox" class="row-checkbox" onchange="toggleSelect(${item.id})" ${isSelected ? 'checked' : ''}></td>
                        <td>${new Date(item.created_at).toLocaleString('pt-BR')}</td>
                        <td style="font-weight: 600">${nomeExibicao}</td>
                        <td>${numApolice || '<span style="color:var(--text-secondary)">-</span>'}</td>
                        <td><span style="background: var(--accent)20; color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem">${item.tipo_documento}</span></td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem" onclick="openEdit(${item.id})">
                                <i class="fas fa-edit"></i> Revisar
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
            updateBulkBar();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBulkBar();
        }

        function toggleSelectAll() {
            const master = document.getElementById('select-all').checked;
            selectedIds.clear();
            if (master) pendingData.forEach(i => selectedIds.add(i.id));
            renderTable();
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulk-bar');
            const count = document.getElementById('selected-count');
            if (selectedIds.size > 0) {
                bar.classList.add('visible');
                count.innerText = `${selectedIds.size} selecionados`;
            } else {
                bar.classList.remove('visible');
            }
        }

        async function openEdit(id) {
            currentEditId = id;
            try {
                const token = localStorage.getItem('admin_token');
                const res = await fetch(`/api/admin/staging/detail/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const item = await res.json();
                currentFullItem = item;

                const norm = normalizeData(item.dados_json);
                document.getElementById('raw-json').innerText = JSON.stringify(item.dados_json, null, 2);

                let formHtml = `
                    <div class="field-group">
                        <label>Nome Completo</label>
                        <input type="text" id="edit-nome" class="input-edit" value="${norm.segurado.NomeCompleto}">
                    </div>
                    <div class="field-group">
                        <label>CPF / CNPJ (Apenas números)</label>
                        <input type="text" id="edit-doc" class="input-edit" value="${norm.segurado.CPF || norm.segurado.CNPJ || ''}">
                    </div>
                    <div class="field-group">
                        <label>Nº Apólice</label>
                        <input type="text" id="edit-apolice" class="input-edit" value="${norm.apolice.NumeroApolice}">
                    </div>
                    <div class="field-group">
                        <label>Ramo</label>
                        <input type="text" id="edit-ramo" class="input-edit" value="${norm.apolice.Ramo}">
                    </div>
                    <div class="field-group">
                        <label>Vigência</label>
                        <div style="display:flex; gap:10px">
                            <input type="date" id="edit-inicio" class="input-edit" value="${norm.apolice.VigenciaInicio}">
                            <input type="date" id="edit-fim" class="input-edit" value="${norm.apolice.VigenciaFim}">
                        </div>
                    </div>
                `;
                document.getElementById('edit-form').innerHTML = formHtml;
                document.getElementById('edit-panel').classList.add('active');
            } catch (err) { alert(err.message); }
        }

        function closeEdit() {
            document.getElementById('edit-panel').classList.remove('active');
        }

        async function saveAndApproveManual() {
            const btn = document.getElementById('btn-save-approve');
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

                // 1. Atualizar o objeto JSON com os valores do formulário
                const json = typeof currentFullItem.dados_json === 'string' ? JSON.parse(currentFullItem.dados_json) : currentFullItem.dados_json;

                if (!json.Segurado) json.Segurado = {};
                if (!json.DadosApolice) json.DadosApolice = {};

                json.Segurado.NomeCompleto = document.getElementById('edit-nome').value;
                const doc = document.getElementById('edit-doc').value.replace(/\D/g, '');
                if (doc.length === 11) json.Segurado.CPF = doc;
                else json.Segurado.CNPJ = doc;

                json.DadosApolice.NumeroApolice = document.getElementById('edit-apolice').value;
                json.DadosApolice.Ramo = document.getElementById('edit-ramo').value;
                json.DadosApolice.VigenciaInicio = document.getElementById('edit-inicio').value;
                json.DadosApolice.VigenciaFim = document.getElementById('edit-fim').value;

                // 2. Enviar para o banco final (reutilizando a lógica de ingestão)
                const token = localStorage.getItem('admin_token');
                const res = await fetch('/api/admin/ingest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(json)
                });

                if (!res.ok) throw new Error('Falha na ingestão final.');

                // 3. Remover da quarentena
                await fetch('/api/admin/staging/bulk-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ids: [currentEditId] })
                });

                alert('✅ Registro importado com sucesso!');
                closeEdit();
                loadPending();
            } catch (err) {
                alert('Erro: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        async function bulkApprove() {
            if (!confirm(`Deseja aprovar e importar ${selectedIds.size} registros definitivamente?`)) return;
            const btn = document.querySelector('.btn-approve');
            const original = btn.innerHTML;
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

                const ids = Array.from(selectedIds);
                const res = await fetch('/api/admin/staging/bulk-approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                    },
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                alert(data.message);
                selectedIds.clear();
                loadPending();
            } catch (err) { alert(err.message); }
            finally {
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        async function bulkDelete() {
            if (!confirm(`Excluir permanentemente ${selectedIds.size} registros da quarentena?`)) return;
            try {
                const ids = Array.from(selectedIds);
                const res = await fetch('/api/admin/staging/bulk-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                    },
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                alert(data.message);
                selectedIds.clear();
                loadPending();
            } catch (err) { alert(err.message); }
        }

        async function confirmDeleteIndividual() {
            if (!confirm('Deseja descartar este registro permanentemente?')) return;
            selectedIds.clear();
            selectedIds.add(currentEditId);
            await bulkDelete();
            closeEdit();
        }

        // Inicializar
        loadPending();
    </script>
</body>

</html>
