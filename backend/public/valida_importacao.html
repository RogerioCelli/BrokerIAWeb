<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Importação - Broker IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .bulk-actions {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 1rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #0f172a;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .checkbox-cell {
            width: 40px;
            text-align: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Modal / Sidebar para Edição */
        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background: var(--card-bg);
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
            padding: 2rem;
            border-left: 1px solid var(--border);
        }

        .overlay.active {
            transform: translateX(0);
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        .field-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .input-edit {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .json-preview {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #10b981;
            overflow-x: auto;
            margin-top: 1rem;
        }

        .load-indicator {
            padding: 3rem;
            text-align: center;
            color: var(--text-secondary);
        }

        #bulk-bar {
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #bulk-bar.visible {
            transform: translateY(0);
            opacity: 1;
            display: flex !important;
        }
    </style>
</head>

<body>

    <a href="/admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Painel Geral</a>

    <div class="header">
        <div>
            <h1>Validação de Importações (Extração Master)</h1>
            <p style="color: var(--text-secondary)">Revise os dados extraídos pela IA antes de enviar para o banco
                final.</p>
        </div>
        <button class="btn btn-secondary" onclick="loadPending()">
            <i class="fas fa-sync"></i> Atualizar Fila
        </button>
    </div>

    <div class="bulk-actions" id="bulk-bar" style="display: none;">
        <span id="selected-count" style="font-weight: 600; margin-right: 1rem;">0 selecionados</span>
        <button class="btn btn-approve" onclick="bulkApprove()">
            <i class="fas fa-check-double"></i> Aprovar em Massa
        </button>
        <button class="btn btn-delete" onclick="bulkDelete()">
            <i class="fas fa-trash-alt"></i> Excluir Selecionados
        </button>
    </div>

    <div id="table-container">
        <div class="load-indicator">Carregando fila de importação...</div>
    </div>

    <!-- PANEL DE EDIÇÃO INDIVIDUAL -->
    <div id="edit-panel" class="overlay">
        <div class="overlay-header">
            <h2>Editar Registro</h2>
            <button class="btn btn-secondary" onclick="closeEdit()"><i class="fas fa-times"></i></button>
        </div>

        <div id="edit-form">
            <!-- Gerado dinamicamente -->
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button id="btn-save-approve" class="btn btn-approve" style="flex: 1;" onclick="saveAndApproveManual()">
                <i class="fas fa-save"></i> Salvar e Importar
            </button>
            <button class="btn btn-delete" onclick="confirmDeleteIndividual()">
                <i class="fas fa-trash"></i> Descartar
            </button>
        </div>

        <h4 style="margin-top: 2rem; color: var(--text-secondary);">JSON Bruto da Extração</h4>
        <div id="raw-json" class="json-preview"></div>
    </div>

    <script>
        let pendingData = [];
        let selectedIds = new Set();
        let currentEditId = null;
        let currentFullItem = null;

        // VERIFICAÇÃO DE AUTENTICAÇÃO E EXPIRAÇÃO (Mesma lógica do admin.html)
        function checkAuth() {
            const token = localStorage.getItem('admin_token');
            const userStr = localStorage.getItem('admin_user');
            const loginTime = localStorage.getItem('admin_login_time');

            const EXPIRATION_HOURS = 2;
            let isExpired = false;

            if (loginTime) {
                const hoursPassed = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
                if (hoursPassed >= EXPIRATION_HOURS) {
                    isExpired = true;
                }
            }

            if (!token || !userStr || isExpired) {
                if (isExpired) {
                    localStorage.removeItem('admin_token');
                    localStorage.removeItem('admin_user');
                    localStorage.removeItem('admin_login_time');
                    alert('Sua sessão expirou por inatividade. Por favor, faça login novamente na tela inicial.');
                }
                window.location.href = '/admin.html';
                return false;
            }
            return true;
        }

        // Executa a verificação IMEDIATAMENTE antes de carregar dados
        if (!checkAuth()) {
            throw new Error("Acesso negado. Redirecionando.");
        }

        // HELPER: Converte data BR (DD/MM/YYYY) para ISO (YYYY-MM-DD)
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            if (dateStr.includes('-')) return dateStr; // Já está em ISO
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
            return dateStr;
        }

        // HELPER: Normaliza telefone para padrão BR do banco de dados
        // Celular: 13 dígitos = 55 + DDD(2) + 9XXXXXXXX(9)
        // Fixo:    12 dígitos = 55 + DDD(2) + XXXXXXXX(8)
        function normalizePhone(raw) {
            if (!raw) return '';
            const digits = String(raw).replace(/\D/g, '');
            if (!digits) return '';

            // Já tem o código do país
            if (digits.startsWith('55')) {
                // 5511999999999 = 13 d (celular OK) | 551199999999 = 12 d (fixo OK)
                if (digits.length === 13 || digits.length === 12) return digits;
                // Sobrou número + 55 inválido → tenta reconstruir a partir do 3º dígito
                return '55' + digits.slice(2);
            }

            // Tem DDD + número completo (11 dígitos = DDD+9+8)
            if (digits.length === 11) return '55' + digits; // celular: 55 + 11 = 13 dígitos ✓

            // Tem DDD + fixo (10 dígitos = DDD+8)
            if (digits.length === 10) return '55' + digits; // fixo: 55 + 10 = 12 dígitos ✓

            // Número sem DDD — retorna como está (não dá para inferir DDD)
            return digits;
        }

        // HELPER: Normaliza os diferentes formatos de JSON (n8n vs Interno)
        function normalizeData(raw) {
            if (!raw) return { segurado: {}, apolice: {}, endereco: {} };

            let data = typeof raw === 'string' ? JSON.parse(raw) : raw;
            console.log("[DEBUG] Normalizando dados:", data);

            // Suporte para array do n8n (recursivo simples)
            if (Array.isArray(data)) data = data[0];
            if (!data) return { segurado: {}, apolice: {}, endereco: {} };

            // Suporte para wrapper "OrganizaDados" (case-insensitive)
            const wrapperKey = Object.keys(data).find(k => k.toLowerCase() === 'organizadados');
            if (wrapperKey) data = data[wrapperKey];

            // Helper: busca chave por alias case-insensitive
            const getKey = (obj, ...aliases) => {
                if (!obj || typeof obj !== 'object') return undefined;
                const found = Object.keys(obj).find(k => aliases.includes(k.toLowerCase()));
                return found ? obj[found] : undefined;
            };

            const norm = { segurado: {}, apolice: {}, endereco: {}, extras: {} };

            // ─── 1. IDENTIFICACAO / Segurado ─────────────────────────────────────
            const iden = getKey(data, 'segurado', 'identificacao', 'identificação', 'cliente') || data;

            const cpfRaw = String(iden.cpf || iden.CPF || iden.cpf_cnpj || iden.CPF_CNPJ || '').replace(/\D/g, '');
            const cnpjRaw = String(iden.cnpj || iden.CNPJ || '').replace(/\D/g, '');
            const docRaw = cpfRaw || cnpjRaw || '';

            norm.segurado.NomeCompleto = iden.nome || iden.Nome || iden.Nome_Segurado || iden.NomeCompleto || iden.nome_completo || 'Não Identificado';
            if (docRaw.length === 11) norm.segurado.CPF = docRaw;
            else if (docRaw.length === 14) norm.segurado.CNPJ = docRaw;

            norm.segurado.RG = iden.rg || iden.RG || '';
            norm.segurado.DataNascimento = iden.data_nascimento || iden.DataNascimento || null;
            norm.segurado.Profissao = iden.profissao || iden.Profissao || '';
            norm.segurado.EstadoCivil = iden.estado_civil || iden.Estado_Civil || '';

            // Suporte para extras (novo n8n)
            const extrasBlock = data.extras || getKey(data, 'outros') || {};
            norm.segurado.CPFConjuge = extrasBlock.cpf_conjuge || iden.cpf_conjuge || iden.CPF_Conjuge || '';

            // ─── 2. CONTATOS ─────────────────────────────────────────────────────
            const cont = getKey(data, 'contatos_segurado', 'contatos') || iden.Contatos || iden.contatos || {};
            const emails = cont.emails || cont.Emails || [];

            norm.segurado.Email = (Array.isArray(emails) ? emails[0] : emails) || cont.email || cont.Email || iden.email || iden.Email || '';
            norm.segurado.Email2 = (Array.isArray(emails) && emails.length > 1 ? emails[1] : '');

            const rawCel = cont.celular || cont.Celular || iden.celular || iden.Celular || '';
            norm.segurado.Celular = normalizePhone(rawCel);

            const comPhone = cont.telefone_comercial || cont.Telefone_Comercial || '';
            const resPhone = cont.telefone_residencial || cont.Telefone_Residencial || '';
            norm.segurado.TelefoneFixo = normalizePhone(comPhone || resPhone);
            norm.segurado.Telefone2 = normalizePhone(comPhone && resPhone ? resPhone : '');

            // ─── 3. ENDERECO ─────────────────────────────────────────────────────
            let endObj = getKey(data, 'enderecos_segurado', 'endereco_principal', 'endereco', 'enderecocompleto', 'enderecos') || iden.endereco_principal || iden.Endereco || iden.Endereço || {};
            // novo n8n manda um array de enderecos ou um objeto com 'residencial' e 'comercial'
            if (Array.isArray(endObj) && endObj.length > 0) {
                endObj = endObj[0];
            } else if (endObj && (endObj.residencial || endObj.comercial)) {
                endObj = endObj.residencial || endObj.comercial; // Pega o primeiro que existir
            }

            norm.endereco.Logradouro = endObj.logradouro || endObj.Logradouro || '';
            let nNum = endObj.numero || endObj.Numero || '';
            norm.endereco.Numero = (nNum && nNum !== 'S/N' && nNum !== 'SN') ? nNum : '';
            norm.endereco.Complemento = endObj.complemento || endObj.Complemento || '';
            norm.endereco.Bairro = endObj.bairro || endObj.Bairro || '';
            norm.endereco.Cidade = endObj.cidade || endObj.Cidade || '';
            norm.endereco.Estado = endObj.estado || endObj.Estado || '';
            norm.endereco.CEP = String(endObj.cep || endObj.CEP || '').replace(/\D/g, '');

            // ─── 4. DADOS_DA_APOLICE ─────────────────────────────────────────────
            const apol = getKey(data, 'dados_apolice', 'dados_da_apolice', 'dados_da_apólice', 'dadosapolice', 'apolice') || {};
            norm.apolice.NumeroApolice = apol.numero_apolice || apol.Numero || apol.NumeroApolice || apol.numero || '';
            const segRaw = apol.seguradora || apol.Seguradora || '';
            norm.apolice.Seguradora = (typeof segRaw === 'object' && segRaw !== null) ? (segRaw.nome || segRaw.Nome || JSON.stringify(segRaw)) : segRaw;
            norm.apolice.Ramo = apol.ramo || apol.Ramo || '';
            norm.apolice.NomeProduto = apol.nome_produto || apol.Nome_do_Produto || apol.NomeProduto || apol.produto || '';
            norm.apolice.ValorPremioTotal = apol.valor_premio_total || apol.premio_total || apol.Valor_Premio_Total || apol.ValorPremioTotal || '';
            norm.apolice.FormaPagamento = apol.forma_pagamento || apol.Forma_Pagamento || apol.FormaPagamento || '';
            norm.apolice.NumeroParcelas = apol.numero_parcelas || apol.Numero_Parcelas || apol.NumeroParcelas || '';
            norm.apolice.FrequenciaPagamento = apol.frequencia_pagamento || apol.Frequencia_Pagamento || '';
            norm.apolice.NumeroProposta = apol.numero_proposta || apol.Numero_Proposta || '';

            // Opcional do bloco de extras do novo n8n
            if (!norm.apolice.NumeroProposta && extrasBlock.documento_informacoes) {
                norm.apolice.NumeroProposta = extrasBlock.documento_informacoes.numero_proposta_endosso || '';
            }

            norm.apolice.VigenciaInicio = formatDateForInput(apol.vigencia_inicio || apol.Vigencia_Inicio || apol.VigenciaInicio || '');
            norm.apolice.VigenciaFim = formatDateForInput(apol.vigencia_fim || apol.Vigencia_Fim || apol.VigenciaFim || '');

            // ─── 5. DADOS_DO_BEM_AUTO ────────────────────────────────────────────
            const auto = getKey(data, 'dados_do_bem', 'dados_bem_auto', 'dados_do_bem_auto', 'bemauto', 'itemsegurado') || {};
            norm.apolice.Placa = auto.placa || auto.Placa || '';
            norm.apolice.Chassi = auto.chassi || auto.Chassi || '';
            norm.apolice.Modelo = auto.modelo || auto.Modelo || '';
            norm.apolice.Fabricante = auto.fabricante || auto.Fabricante || '';
            norm.apolice.AnoModelo = auto.ano_modelo || auto.Ano_Modelo || auto.AnoModelo || '';
            norm.apolice.AnoFabricacao = auto.ano_fabricacao || auto.Ano_Fabricacao || auto.AnoFabricacao || '';
            norm.apolice.Renavam = auto.renavam || auto.Renavam || '';
            norm.apolice.CodigoFIPE = auto.cod_fipe || auto.codigo_fipe || auto.Codigo_FIPE || auto.CodigoFIPE || '';
            norm.apolice.CorVeiculo = auto.cor || auto.Cor || auto.cor_veiculo || '';
            norm.apolice.Combustivel = auto.combustivel || auto.Combustivel || '';
            norm.apolice.Kilometragem = auto.quilometragem || auto.kilometragem || auto.Kilometragem || '';
            norm.apolice.Blindado = auto.blindado || auto.Blindado || false;
            norm.apolice.KitGas = auto.kit_gas || auto.Kit_Gas || false;
            norm.apolice.CambioAutomatico = auto.cambio_automatico || auto.Cambio_Automatico || false;

            // Franquia geral
            let franq = auto.franquia_geral || auto.Franquia_Tipo || auto.franquia_tipo || (data.franquias ? data.franquias.tipo_franquia : '') || '';
            if (!franq && Array.isArray(data.franquias) && data.franquias.length > 0) {
                franq = data.franquias.map(f => `${f.tipo}: ${f.valor}`).join(', ');
            } else if (!franq && data.franquias && typeof data.franquias === 'object' && data.franquias.casco) {
                franq = `${data.franquias.tipo_franquia || 'Casco'}: R$ ${data.franquias.casco}`;
            }
            norm.apolice.FranquiaTipo = franq;

            // ─── 6. EXTRAS ───────────────────────────────────────────────────────
            norm.extras = {
                Corretor: apol.corretora || extrasBlock.corretora || extrasBlock.Corretor || {},
                Coberturas: Array.isArray(data.coberturas) ? data.coberturas.map(c => typeof c === 'string' ? c : `${c.tipo}${c.limite_indenizacao ? ` (${c.limite_indenizacao})` : ''}`) : (extrasBlock.Coberturas_Principais || extrasBlock.coberturas || []),
                Condutor: data.principal_condutor || data.condutores || extrasBlock.Principal_Condutor || extrasBlock.condutor || {},
                DadosAdicionais: data.pagamento_debito_em_conta || extrasBlock.dados_bancarios_debito || extrasBlock.OutrosDados || extrasBlock
            };

            return norm;

        }

        async function loadPending() {
            const container = document.getElementById('table-container');
            try {
                const token = localStorage.getItem('admin_token');
                const res = await fetch('/api/admin/staging/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                pendingData = data;
                selectedIds.clear();
                renderTable();
            } catch (err) {
                container.innerHTML = `<p style="color:red">Erro ao carregar: ${err.message}</p>`;
            }
        }

        function renderTable() {
            const container = document.getElementById('table-container');
            if (!pendingData || pendingData.length === 0) {
                container.innerHTML = '<div class="load-indicator">🎉 Nenhuma importação pendente!</div>';
                document.getElementById('bulk-bar').classList.remove('visible');
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                            <th>Data Extração</th>
                            <th>Segurado</th>
                            <th>Nº Apólice</th>
                            <th>Ramo / Documento</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            pendingData.forEach(item => {
                const isSelected = selectedIds.has(item.id);
                // Tenta extrair o nome real se o sumário estiver vazio
                let nomeExibicao = item.nome_segurado;
                let numApolice = "";

                if (item.dados_json) {
                    const norm = normalizeData(item.dados_json);
                    if (nomeExibicao === "Não Identificado") nomeExibicao = norm.segurado.NomeCompleto;
                    numApolice = norm.apolice.NumeroApolice;
                }

                html += `
                    <tr>
                        <td class="checkbox-cell"><input type="checkbox" class="row-checkbox" onchange="toggleSelect(${item.id})" ${isSelected ? 'checked' : ''}></td>
                        <td>${new Date(item.created_at).toLocaleString('pt-BR')}</td>
                        <td style="font-weight: 600">${nomeExibicao}</td>
                        <td>${numApolice || '<span style="color:var(--text-secondary)">-</span>'}</td>
                        <td><span style="background: var(--accent)20; color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem">${item.tipo_documento}</span></td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem" onclick="openEdit(${item.id})">
                                <i class="fas fa-edit"></i> Revisar
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
            updateBulkBar();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBulkBar();
        }

        function toggleSelectAll() {
            const master = document.getElementById('select-all').checked;
            selectedIds.clear();
            if (master) pendingData.forEach(i => selectedIds.add(i.id));
            renderTable();
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulk-bar');
            const count = document.getElementById('selected-count');
            if (selectedIds.size > 0) {
                bar.classList.add('visible');
                count.innerText = `${selectedIds.size} selecionados`;
            } else {
                bar.classList.remove('visible');
            }
        }

        async function openEdit(id) {
            currentEditId = id;
            try {
                const token = localStorage.getItem('admin_token');
                const res = await fetch(`/api/admin/staging/detail/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const item = await res.json();
                currentFullItem = item;

                const norm = normalizeData(item.dados_json);

                // ─── Formulário de Edição Completo ───────────────────────────
                let formHtml = `
                    <p style="color: var(--text-secondary); font-size:0.8rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.8rem;">🧑 SEGURADO</p>

                    <div class="field-group">
                        <label>Nome Completo</label>
                        <input type="text" id="edit-nome" class="input-edit" value="${esc(norm.segurado.NomeCompleto)}">
                    </div>

        // Escapa aspas para usar em atributos HTML
        function esc(str) {
            return String(str || '').replace(/"/g, '&quot;');
        }

        // Renderiza JSON como pares chave: valor legíveis
        function renderJsonReadable(obj, indent = 0) {
            if (!obj) return '';
            const data = typeof obj === 'string' ? JSON.parse(obj) : obj;
            let html = '';
            const pad = indent * 16;

            for (const [key, val] of Object.entries(data)) {
                if (val === null || val === undefined || val === '') continue;
                if (Array.isArray(val)) {
                    if (val.length === 0) continue;
                    // Array de objetos → renderiza cada um como sub-bloco numerado
                    if (typeof val[0] === 'object' && val[0] !== null) {
                        html += `<div style="margin-left:${pad}px; margin-top:8px;"><span style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">${key}</span>`;
                        val.forEach((item, i) => {
                            html += `<div style="margin-left:${pad + 8}px; border-left:2px solid #334155; padding-left:8px; margin-top:4px;"><span style="color:#64748b; font-size:0.7rem;">#${i + 1}</span>`;
                            html += renderJsonReadable(item, indent + 1);
                            html += `</div>`;
                        });
                        html += `</div>`;
                    } else {
                        // Array de strings/números → junta em linha
                        const joined = val.filter(v => v !== null && v !== '' && v !== undefined).join(', ');
                        if (joined) html += `<div style="margin-left:${pad}px; padding:3px 0;"><span style="color:#64748b; font-size:0.75rem;">${key}:</span> <span style="color:#e2e8f0;">${joined}</span></div>`;
                    }
                } else if (typeof val === 'object') {
                    html += `<div style="margin-left:${pad}px; margin-top:8px;"><span style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">${key}</span>`;
                    html += renderJsonReadable(val, indent + 1);
                    html += `</div>`;
                } else {
                    html += `<div style="margin-left:${pad}px; padding:3px 0;"><span style="color:#64748b; font-size:0.75rem;">${key}:</span> <span style="color:#10b981; font-weight:500;">${val}</span></div>`;
                }
            }
            return html;
        }

            document.getElementById('edit-panel').classList.remove('active');
        }

                }

                // 2. Enviar para o banco final (reutilizando a lógica de ingestão)
                const token = localStorage.getItem('admin_token');
                const res = await fetch('/api/admin/ingest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(json)
                });

                if (!res.ok) throw new Error('Falha na ingestão final.');

                // 3. Remover da quarentena
                await fetch('/api/admin/staging/bulk-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ids: [currentEditId] })
                });

                alert('✅ Registro importado com sucesso!');
                closeEdit();
                loadPending();
            } catch (err) {
                alert('Erro: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        async function bulkApprove() {
            if (!confirm(`Deseja aprovar e importar ${selectedIds.size} registros definitivamente?`)) return;
            const btn = document.querySelector('.btn-approve');
            const original = btn.innerHTML;
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

                const ids = Array.from(selectedIds);
                const res = await fetch('/api/admin/staging/bulk-approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                    },
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                alert(data.message);
                selectedIds.clear();
                loadPending();
            } catch (err) { alert(err.message); }
            finally {
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        async function bulkDelete() {
            if (!confirm(`Excluir permanentemente ${selectedIds.size} registros da quarentena?`)) return;
            try {
                const ids = Array.from(selectedIds);
                const res = await fetch('/api/admin/staging/bulk-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                    },
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                alert(data.message);
                selectedIds.clear();
                loadPending();
            } catch (err) { alert(err.message); }
        }

        async function confirmDeleteIndividual() {
            if (!confirm('Deseja descartar este registro permanentemente?')) return;
            selectedIds.clear();
            selectedIds.add(currentEditId);
            await bulkDelete();
            closeEdit();
        }

        // Inicializar
        loadPending();
    </script>
</body>

</html>
