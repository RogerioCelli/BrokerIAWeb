<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Importação - Broker IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .bulk-actions {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 1rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #0f172a;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .checkbox-cell {
            width: 40px;
            text-align: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Modal / Sidebar para Edição */
        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background: var(--card-bg);
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
            padding: 2rem;
            border-left: 1px solid var(--border);
        }

        .overlay.active {
            transform: translateX(0);
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        .field-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .input-edit {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .json-preview {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #10b981;
            overflow-x: auto;
            margin-top: 1rem;
        }

        .load-indicator {
            padding: 3rem;
            text-align: center;
            color: var(--text-secondary);
        }

        #bulk-bar {
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #bulk-bar.visible {
            transform: translateY(0);
            opacity: 1;
            display: flex !important;
        }
    </style>
</head>

<body>

    <a href="/admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Painel Geral</a>

    <div class="header">
        <div>
            <h1>Validação de Importações (Extração Master)</h1>
            <p style="color: var(--text-secondary)">Revise os dados extraídos pela IA antes de enviar para o banco
                final.</p>
        </div>
        <button class="btn btn-secondary" onclick="loadPending()">
            <i class="fas fa-sync"></i> Atualizar Fila
        </button>
    </div>

    <div class="bulk-actions" id="bulk-bar" style="display: none;">
        <span id="selected-count" style="font-weight: 600; margin-right: 1rem;">0 selecionados</span>
        <button class="btn btn-approve" onclick="bulkApprove()">
            <i class="fas fa-check-double"></i> Aprovar em Massa
        </button>
        <button class="btn btn-delete" onclick="bulkDelete()">
            <i class="fas fa-trash-alt"></i> Excluir Selecionados
        </button>
    </div>

    <div id="table-container">
        <div class="load-indicator">Carregando fila de importação...</div>
    </div>

    <!-- PANEL DE EDIÇÃO INDIVIDUAL -->
    <div id="edit-panel" class="overlay">
        <div class="overlay-header">
            <h2>Editar Registro</h2>
            <button class="btn btn-secondary" onclick="closeEdit()"><i class="fas fa-times"></i></button>
        </div>

        <div id="edit-form">
            <!-- Gerado dinamicamente -->
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button id="btn-save-approve" class="btn btn-approve" style="flex: 1;" onclick="saveAndApproveManual()">
                <i class="fas fa-save"></i> Salvar e Importar
            </button>
            <button class="btn btn-delete" onclick="confirmDeleteIndividual()">
                <i class="fas fa-trash"></i> Descartar
            </button>
        </div>

        <h4 style="margin-top: 2rem; color: var(--text-secondary);">JSON Bruto da Extração</h4>
        <div id="raw-json" class="json-preview"></div>
    </div>

    <script>
        let pendingData = [];
        let selectedIds = new Set();
        let currentEditId = null;
        let currentFullItem = null;

        // HELPER: Converte data BR (DD/MM/YYYY) para ISO (YYYY-MM-DD)
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            if (dateStr.includes('-')) return dateStr; // Já está em ISO
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
            return dateStr;
        }

        // HELPER: Normaliza telefone para padrão BR do banco de dados
        // Celular: 13 dígitos = 55 + DDD(2) + 9XXXXXXXX(9)
        // Fixo:    12 dígitos = 55 + DDD(2) + XXXXXXXX(8)
        function normalizePhone(raw) {
            if (!raw) return '';
            const digits = String(raw).replace(/\D/g, '');
            if (!digits) return '';

            // Já tem o código do país
            if (digits.startsWith('55')) {
                // 5511999999999 = 13 d (celular OK) | 551199999999 = 12 d (fixo OK)
                if (digits.length === 13 || digits.length === 12) return digits;
                // Sobrou número + 55 inválido → tenta reconstruir a partir do 3º dígito
                return '55' + digits.slice(2);
            }

            // Tem DDD + número completo (11 dígitos = DDD+9+8)
            if (digits.length === 11) return '55' + digits; // celular: 55 + 11 = 13 dígitos ✓

            // Tem DDD + fixo (10 dígitos = DDD+8)
            if (digits.length === 10) return '55' + digits; // fixo: 55 + 10 = 12 dígitos ✓

            // Número sem DDD — retorna como está (não dá para inferir DDD)
            return digits;
        }

        // HELPER: Normaliza os diferentes formatos de JSON (n8n vs Interno)
        function normalizeData(raw) {
            if (!raw) return { segurado: {}, apolice: {}, endereco: {} };

            let data = typeof raw === 'string' ? JSON.parse(raw) : raw;
            console.log("[DEBUG] Normalizando dados:", data);

            // Suporte para array do n8n (recursivo simples)
            if (Array.isArray(data)) data = data[0];
            if (!data) return { segurado: {}, apolice: {}, endereco: {} };

            // Suporte para wrapper "OrganizaDados" (case-insensitive)
            const wrapperKey = Object.keys(data).find(k => k.toLowerCase() === 'organizadados');
            if (wrapperKey) data = data[wrapperKey];

            // Helper: busca chave por alias case-insensitive
            const getKey = (obj, ...aliases) => {
                if (!obj || typeof obj !== 'object') return undefined;
                const found = Object.keys(obj).find(k => aliases.includes(k.toLowerCase()));
                return found ? obj[found] : undefined;
            };

            const norm = { segurado: {}, apolice: {}, endereco: {} };

            // ─── 1. IDENTIFICACAO ────────────────────────────────────────────────
            // Suporta: IDENTIFICACAO (novo), Identificacao / segurado / cliente (antigo)
            const iden = getKey(data, 'identificacao', 'identificação', 'segurado', 'cliente') || data;

            const cpfRaw = String(iden.CPF || iden.cpf || iden.cpf_cnpj || iden.CPF_CNPJ || '').replace(/\D/g, '');
            const cnpjRaw = String(iden.CNPJ || iden.cnpj || '').replace(/\D/g, '');
            const docRaw = cpfRaw || cnpjRaw || '';

            norm.segurado.NomeCompleto = iden.Nome_Segurado || iden.NomeCompleto || iden.nome_completo || iden.nome || iden.Nome || 'Não Identificado';
            if (docRaw.length === 11) norm.segurado.CPF = docRaw;
            else if (docRaw.length === 14) norm.segurado.CNPJ = docRaw;

            // ─── 2. CONTATOS ─────────────────────────────────────────────────────
            const cont = getKey(data, 'contatos') || iden.Contatos || iden.contatos || {};
            const emails = cont.Emails || cont.emails || [];
            const celulares = cont.Celulares || cont.celulares || [];
            const fixos = cont.Telefones_Fixos || cont.Telefones_fixos || cont.telefones_fixos || [];
            norm.segurado.Email = (Array.isArray(emails) ? emails[0] : emails) || cont.Email || cont.email || iden.Email || '';
            // Normaliza celular → 13 dígitos (55+DDD+9XXXXXX)
            const rawCel = (Array.isArray(celulares) ? celulares[0] : celulares) || cont.Celular || cont.celular || iden.Celular || '';
            norm.segurado.Celular = normalizePhone(rawCel);
            // Normaliza fixo → 12 dígitos (55+DDD+XXXXXXXX)
            const rawTel = (Array.isArray(fixos) ? fixos[0] : fixos) || '';
            norm.segurado.TelefoneFixo = normalizePhone(rawTel);

            // ─── 3. DADOS_DA_APOLICE ─────────────────────────────────────────────
            const apol = getKey(data, 'dados_da_apolice', 'dados_da_apólice', 'dadosapolice', 'apolice') || {};
            norm.apolice.NumeroApolice = apol.Numero || apol.numero_apolice || apol.NumeroApolice || apol.numero || '';
            // Seguradora pode ser string ou objeto {Nome: '...'}
            const segRaw = apol.Seguradora || apol.seguradora || '';
            norm.apolice.Seguradora = (typeof segRaw === 'object' && segRaw !== null) ? (segRaw.Nome || segRaw.nome || JSON.stringify(segRaw)) : segRaw;
            norm.apolice.Ramo = apol.Ramo || apol.ramo || '';
            norm.apolice.VigenciaInicio = formatDateForInput(apol.Vigencia_Inicio || apol.vigencia_inicio || apol.VigenciaInicio || '');
            norm.apolice.VigenciaFim = formatDateForInput(apol.Vigencia_Fim || apol.vigencia_fim || apol.VigenciaFim || '');


            // ─── 4. DADOS_DO_BEM_AUTO ────────────────────────────────────────────
            const auto = getKey(data, 'dados_do_bem_auto', 'dados_bem_auto', 'bemauto', 'itemsegurado') || {};
            norm.apolice.Placa = auto.Placa || auto.placa || '';
            norm.apolice.Chassi = auto.Chassi || auto.chassi || '';
            norm.apolice.Modelo = auto.Modelo || auto.modelo || '';

            return norm;
        }

        async function loadPending() {
            const container = document.getElementById('table-container');
            try {
                const token = localStorage.getItem('admin_token');
                const res = await fetch('/api/admin/staging/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                pendingData = data;
                selectedIds.clear();
                renderTable();
            } catch (err) {
                container.innerHTML = `<p style="color:red">Erro ao carregar: ${err.message}</p>`;
            }
        }

        function renderTable() {
            const container = document.getElementById('table-container');
            if (!pendingData || pendingData.length === 0) {
                container.innerHTML = '<div class="load-indicator">🎉 Nenhuma importação pendente!</div>';
                document.getElementById('bulk-bar').classList.remove('visible');
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                            <th>Data Extração</th>
                            <th>Segurado</th>
                            <th>Nº Apólice</th>
                            <th>Ramo / Documento</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            pendingData.forEach(item => {
                const isSelected = selectedIds.has(item.id);
                // Tenta extrair o nome real se o sumário estiver vazio
                let nomeExibicao = item.nome_segurado;
                let numApolice = "";

                if (item.dados_json) {
                    const norm = normalizeData(item.dados_json);
                    if (nomeExibicao === "Não Identificado") nomeExibicao = norm.segurado.NomeCompleto;
                    numApolice = norm.apolice.NumeroApolice;
                }

                html += `
                    <tr>
                        <td class="checkbox-cell"><input type="checkbox" class="row-checkbox" onchange="toggleSelect(${item.id})" ${isSelected ? 'checked' : ''}></td>
                        <td>${new Date(item.created_at).toLocaleString('pt-BR')}</td>
                        <td style="font-weight: 600">${nomeExibicao}</td>
                        <td>${numApolice || '<span style="color:var(--text-secondary)">-</span>'}</td>
                        <td><span style="background: var(--accent)20; color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem">${item.tipo_documento}</span></td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem" onclick="openEdit(${item.id})">
                                <i class="fas fa-edit"></i> Revisar
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
            updateBulkBar();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBulkBar();
        }

        function toggleSelectAll() {
            const master = document.getElementById('select-all').checked;
            selectedIds.clear();
            if (master) pendingData.forEach(i => selectedIds.add(i.id));
            renderTable();
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulk-bar');
            const count = document.getElementById('selected-count');
            if (selectedIds.size > 0) {
                bar.classList.add('visible');
                count.innerText = `${selectedIds.size} selecionados`;
            } else {
                bar.classList.remove('visible');
            }
        }

        async function openEdit(id) {
            currentEditId = id;
            try {
                const token = localStorage.getItem('admin_token');
                const res = await fetch(`/api/admin/staging/detail/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const item = await res.json();
                currentFullItem = item;

                const norm = normalizeData(item.dados_json);

                // ─── Formulário de Edição Completo ───────────────────────────
                let formHtml = `
                    <p style="color: var(--text-secondary); font-size:0.8rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.8rem;">🧑 SEGURADO</p>

                    <div class="field-group">
                        <label>Nome Completo</label>
                        <input type="text" id="edit-nome" class="input-edit" value="${esc(norm.segurado.NomeCompleto)}">
                    </div>
                    <div class="field-group">
                        <label>CPF / CNPJ (apenas números)</label>
                        <input type="text" id="edit-doc" class="input-edit" value="${esc(norm.segurado.CPF || norm.segurado.CNPJ || '')}">
                    </div>
                    <div class="field-group">
                        <label>E-mail</label>
                        <input type="text" id="edit-email" class="input-edit" value="${esc(norm.segurado.Email || '')}">
                    </div>
                    <div style="display:flex; gap:10px">
                        <div class="field-group" style="flex:1">
                            <label>Celular</label>
                            <input type="text" id="edit-celular" class="input-edit" value="${esc(norm.segurado.Celular || '')}">
                        </div>
                        <div class="field-group" style="flex:1">
                            <label>Telefone Fixo</label>
                            <input type="text" id="edit-telefone" class="input-edit" value="${esc(norm.segurado.TelefoneFixo || '')}">
                        </div>
                    </div>

                    <p style="color: var(--text-secondary); font-size:0.8rem; margin: 1.5rem 0 0.8rem; border-bottom:1px solid var(--border); padding-bottom:0.8rem;">📋 APÓLICE</p>

                    <div class="field-group">
                        <label>Nº Apólice</label>
                        <input type="text" id="edit-apolice" class="input-edit" value="${esc(norm.apolice.NumeroApolice)}">
                    </div>
                    <div style="display:flex; gap:10px">
                        <div class="field-group" style="flex:1">
                            <label>Seguradora</label>
                            <input type="text" id="edit-seguradora" class="input-edit" value="${esc(norm.apolice.Seguradora || '')}">
                        </div>
                        <div class="field-group" style="flex:1">
                            <label>Ramo</label>
                            <input type="text" id="edit-ramo" class="input-edit" value="${esc(norm.apolice.Ramo || '')}">
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Vigência</label>
                        <div style="display:flex; gap:10px">
                            <input type="date" id="edit-inicio" class="input-edit" value="${esc(norm.apolice.VigenciaInicio)}">
                            <input type="date" id="edit-fim" class="input-edit" value="${esc(norm.apolice.VigenciaFim)}">
                        </div>
                    </div>

                    ${(norm.apolice.Placa || norm.apolice.Chassi || norm.apolice.Modelo) ? `
                    <p style="color: var(--text-secondary); font-size:0.8rem; margin: 1.5rem 0 0.8rem; border-bottom:1px solid var(--border); padding-bottom:0.8rem;">🚗 VEÍCULO</p>
                    <div style="display:flex; gap:10px">
                        <div class="field-group" style="flex:1">
                            <label>Placa</label>
                            <input type="text" id="edit-placa" class="input-edit" value="${esc(norm.apolice.Placa || '')}">
                        </div>
                        <div class="field-group" style="flex:1">
                            <label>Chassi</label>
                            <input type="text" id="edit-chassi" class="input-edit" value="${esc(norm.apolice.Chassi || '')}">
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Modelo</label>
                        <input type="text" id="edit-modelo" class="input-edit" value="${esc(norm.apolice.Modelo || '')}">
                    </div>` : ''}

                    <p style="color: var(--text-secondary); font-size:0.8rem; margin: 1.5rem 0 0.8rem; border-bottom:1px solid var(--border); padding-bottom:0.8rem;">📦 DADOS COMPLETOS EXTRAÍDOS</p>
                `;

                document.getElementById('edit-form').innerHTML = formHtml;

                // ─── JSON Bruto: exibição legível ────────────────────────────
                document.getElementById('raw-json').innerHTML = renderJsonReadable(item.dados_json);

                document.getElementById('edit-panel').classList.add('active');
            } catch (err) { alert(err.message); }
        }

        // Escapa aspas para usar em atributos HTML
        function esc(str) {
            return String(str || '').replace(/"/g, '&quot;');
        }

        // Renderiza JSON como pares chave: valor legíveis
        function renderJsonReadable(obj, indent = 0) {
            if (!obj) return '';
            const data = typeof obj === 'string' ? JSON.parse(obj) : obj;
            let html = '';
            const pad = indent * 16;

            for (const [key, val] of Object.entries(data)) {
                if (val === null || val === undefined || val === '') continue;
                if (Array.isArray(val)) {
                    if (val.length === 0) continue;
                    // Array de objetos → renderiza cada um como sub-bloco numerado
                    if (typeof val[0] === 'object' && val[0] !== null) {
                        html += `<div style="margin-left:${pad}px; margin-top:8px;"><span style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">${key}</span>`;
                        val.forEach((item, i) => {
                            html += `<div style="margin-left:${pad + 8}px; border-left:2px solid #334155; padding-left:8px; margin-top:4px;"><span style="color:#64748b; font-size:0.7rem;">#${i + 1}</span>`;
                            html += renderJsonReadable(item, indent + 1);
                            html += `</div>`;
                        });
                        html += `</div>`;
                    } else {
                        // Array de strings/números → junta em linha
                        const joined = val.filter(v => v !== null && v !== '' && v !== undefined).join(', ');
                        if (joined) html += `<div style="margin-left:${pad}px; padding:3px 0;"><span style="color:#64748b; font-size:0.75rem;">${key}:</span> <span style="color:#e2e8f0;">${joined}</span></div>`;
                    }
                } else if (typeof val === 'object') {
                    html += `<div style="margin-left:${pad}px; margin-top:8px;"><span style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">${key}</span>`;
                    html += renderJsonReadable(val, indent + 1);
                    html += `</div>`;
                } else {
                    html += `<div style="margin-left:${pad}px; padding:3px 0;"><span style="color:#64748b; font-size:0.75rem;">${key}:</span> <span style="color:#10b981; font-weight:500;">${val}</span></div>`;
                }
            }
            return html;
        }

        function closeEdit() {
            document.getElementById('edit-panel').classList.remove('active');
        }

        async function saveAndApproveManual() {
            const btn = document.getElementById('btn-save-approve');
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

                // 1. Atualizar o objeto JSON com os valores do formulário
                const json = typeof currentFullItem.dados_json === 'string' ? JSON.parse(currentFullItem.dados_json) : currentFullItem.dados_json;

                // Garante estrutura para escrita (suporta ambos os formatos)
                if (!json.IDENTIFICACAO) json.IDENTIFICACAO = {};
                if (!json.DADOS_DA_APOLICE) json.DADOS_DA_APOLICE = {};
                if (!json.CONTATOS) json.CONTATOS = {};
                if (!json.DADOS_DO_BEM_AUTO) json.DADOS_DO_BEM_AUTO = {};

                json.IDENTIFICACAO.Nome_Segurado = document.getElementById('edit-nome').value;
                const doc = document.getElementById('edit-doc').value.replace(/\D/g, '');
                if (doc.length === 11) json.IDENTIFICACAO.CPF = doc;
                else if (doc.length === 14) json.IDENTIFICACAO.CNPJ = doc;

                const emailVal = document.getElementById('edit-email')?.value;
                if (emailVal) json.CONTATOS.Emails = [emailVal];
                const celVal = document.getElementById('edit-celular')?.value.replace(/\D/g, '');
                if (celVal) json.CONTATOS.Celulares = [celVal];
                const telVal = document.getElementById('edit-telefone')?.value.replace(/\D/g, '');
                if (telVal) json.CONTATOS.Telefones_Fixos = [telVal];

                json.DADOS_DA_APOLICE.Numero = document.getElementById('edit-apolice').value;
                json.DADOS_DA_APOLICE.Seguradora = document.getElementById('edit-seguradora')?.value || json.DADOS_DA_APOLICE.Seguradora;
                json.DADOS_DA_APOLICE.Ramo = document.getElementById('edit-ramo').value;
                json.DADOS_DA_APOLICE.Vigencia_Inicio = document.getElementById('edit-inicio').value;
                json.DADOS_DA_APOLICE.Vigencia_Fim = document.getElementById('edit-fim').value;

                const placaEl = document.getElementById('edit-placa');
                if (placaEl) json.DADOS_DO_BEM_AUTO.Placa = placaEl.value;
                const chassiEl = document.getElementById('edit-chassi');
                if (chassiEl) json.DADOS_DO_BEM_AUTO.Chassi = chassiEl.value;
                const modeloEl = document.getElementById('edit-modelo');
                if (modeloEl) json.DADOS_DO_BEM_AUTO.Modelo = modeloEl.value;

                // 2. Enviar para o banco final (reutilizando a lógica de ingestão)
                const token = localStorage.getItem('admin_token');
                const res = await fetch('/api/admin/ingest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(json)
                });

                if (!res.ok) throw new Error('Falha na ingestão final.');

                // 3. Remover da quarentena
                await fetch('/api/admin/staging/bulk-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ids: [currentEditId] })
                });

                alert('✅ Registro importado com sucesso!');
                closeEdit();
                loadPending();
            } catch (err) {
                alert('Erro: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        async function bulkApprove() {
            if (!confirm(`Deseja aprovar e importar ${selectedIds.size} registros definitivamente?`)) return;
            const btn = document.querySelector('.btn-approve');
            const original = btn.innerHTML;
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

                const ids = Array.from(selectedIds);
                const res = await fetch('/api/admin/staging/bulk-approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                    },
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                alert(data.message);
                selectedIds.clear();
                loadPending();
            } catch (err) { alert(err.message); }
            finally {
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        async function bulkDelete() {
            if (!confirm(`Excluir permanentemente ${selectedIds.size} registros da quarentena?`)) return;
            try {
                const ids = Array.from(selectedIds);
                const res = await fetch('/api/admin/staging/bulk-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                    },
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                alert(data.message);
                selectedIds.clear();
                loadPending();
            } catch (err) { alert(err.message); }
        }

        async function confirmDeleteIndividual() {
            if (!confirm('Deseja descartar este registro permanentemente?')) return;
            selectedIds.clear();
            selectedIds.add(currentEditId);
            await bulkDelete();
            closeEdit();
        }

        // Inicializar
        loadPending();
    </script>
</body>

</html>
